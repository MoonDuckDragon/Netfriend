# ================================================================
# [정보 수집 플레이북] 레거시 + K9 전 장비 대상
#
#  기능: 4가지 핵심 show 명령어 실행 후, 
#        결과를 Ansible 컨트롤러의 현재 디렉토리에 
#        'Switch-이름_report.txt' 파일로 저장합니다.
# ================================================================
---
# ────────────────────────────────────────────────────
# [PLAY 1] Telnet 레거시 구역 (SW2, SW6, SW8)
# ────────────────────────────────────────────────────
- name: "정보 수집 - Telnet 레거시 구역"
  hosts: legacy_telnet_switches
  gather_facts: false

  tasks:
    - name: "Task 1: [Gather] 필수 show 명령어 일괄 실행"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - terminal length 0
          - show cdp neighbors detail
          - show interfaces status
          - show vlan brief
          - show spanning-tree summary
      register: telnet_output

- name: "Task 2: [Result] 화면에 출력하기"
      debug:
        var: telnet_output.stdout

# ────────────────────────────────────────────────────
# [PLAY 2] SSH K9 구역 (SW4, SW5)
# ────────────────────────────────────────────────────
- name: "정보 수집 - SSH K9 구역"
  hosts: modern_ssh_switches
  gather_facts: false

  tasks:
    - name: "Task 1: [Gather] 필수 show 명령어 일괄 실행"
      cisco.ios.ios_command:
        commands:
          - show cdp neighbors detail
          - show interfaces status
          - show vlan brief
          - show spanning-tree summary
      register: ssh_output

    - name: "Task 2: [Result] 화면에 출력하기"
      debug:
        msg: "{{ ssh_output.stdout | join('\n\n=========================================\n\n') }}"
