---
- name: "SW4 Trap 목적지 수정"
  hosts: Switch-4
  gather_facts: false
  tasks:
    - name: "기존 잘못된 host 제거 + 올바른 host 추가"
      cisco.ios.ios_config:
        lines:
          - no snmp-server host 10.254.254.1 version 2c PUBKEY
          - snmp-server host 10.254.254.254 version 2c PUBKEY
    - name: "저장"
      cisco.ios.ios_command:
        commands: write memory
