---
# ================================================================
# [NETWORK EMPIRE - MASTER DEPLOYMENT PLAYBOOK]
# 대상: BB(SW4,SW5), DS(SW2,SW6), AS(SW8)
# 내용: VLAN, 트렁크, SVI, MHSRP, ACL(수정됨), STP, 라우팅(Transit SVI OSPF) 통합
# ================================================================

# ────────────────────────────────────────────────────
# PHASE 1: VLAN 생성 + 트렁크 설정
# ────────────────────────────────────────────────────
- name: "Phase 1-1: VLAN 생성 + 트렁크 (BB - SSH)"
  hosts: modern_ssh_switches
  gather_facts: false
  tasks:
    - name: "VLAN 생성"
      cisco.ios.ios_vlans:
        config:
          - { vlan_id: 500, name: SERVER }
          - { vlan_id: 510, name: USER }
          - { vlan_id: 520, name: GUEST }
          - { vlan_id: 530, name: ISOLATION }
          - { vlan_id: 99, name: OOB_MGMT }
        state: merged

    - name: "트렁크 포트 설정 (BB→DS, BB↔BB)"
      cisco.ios.ios_config:
        lines:
          - switchport trunk encapsulation dot1q
          - switchport mode trunk
          - switchport trunk allowed vlan 99,500,510,520,530
        parents: "interface {{ item }}"
      loop:
        - Gi0/1
        - Gi0/2
        - Gi0/3
        - Gi0/15

    - name: "설정 저장"
      cisco.ios.ios_command:
        commands: write memory

- name: "Phase 1-2: VLAN 생성 + 트렁크 (DS/AS - Telnet)"
  hosts: legacy_telnet_switches
  gather_facts: false
  tasks:
    - name: "VLAN 생성"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - vlan 500
          - name SERVER
          - vlan 510
          - name USER
          - vlan 520
          - name GUEST
          - vlan 530
          - name ISOLATION
          - vlan 99
          - name OOB_MGMT
          - exit
          - end
          - write memory

# ────────────────────────────────────────────────────
# PHASE 2: SVI + MHSRP (VLAN 로드밸런싱)
# ────────────────────────────────────────────────────
- name: "Phase 2-1: SVI + HSRP 설정 (SW2 - VLAN 500/510 대장)"
  hosts: sw2
  gather_facts: false
  tasks:
    - name: "ip routing 및 MHSRP 설정"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - ip routing
          - interface vlan 500
          - ip address 10.5.5.2 255.255.255.192
          - standby 1 ip 10.5.5.1
          - standby 1 priority 110
          - standby 1 preempt
          - no shutdown
          - exit
          - interface vlan 510
          - ip address 10.5.5.66 255.255.255.192
          - standby 2 ip 10.5.5.65
          - standby 2 priority 110
          - standby 2 preempt
          - no shutdown
          - exit
          - interface vlan 520
          - ip address 10.5.5.130 255.255.255.192
          - standby 3 ip 10.5.5.129
          - standby 3 priority 100
          - standby 3 preempt
          - no shutdown
          - exit
          - interface vlan 530
          - ip address 10.5.5.194 255.255.255.192
          - standby 4 ip 10.5.5.193
          - standby 4 priority 100
          - standby 4 preempt
          - no shutdown
          - end
          - write memory

- name: "Phase 2-2: SVI + HSRP 설정 (SW6 - VLAN 520/530 대장)"
  hosts: sw6
  gather_facts: false
  tasks:
    - name: "ip routing 및 MHSRP 설정"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - ip routing
          - interface vlan 500
          - ip address 10.5.5.3 255.255.255.192
          - standby 1 ip 10.5.5.1
          - standby 1 priority 100
          - standby 1 preempt
          - no shutdown
          - exit
          - interface vlan 510
          - ip address 10.5.5.67 255.255.255.192
          - standby 2 ip 10.5.5.65
          - standby 2 priority 100
          - standby 2 preempt
          - no shutdown
          - exit
          - interface vlan 520
          - ip address 10.5.5.131 255.255.255.192
          - standby 3 ip 10.5.5.129
          - standby 3 priority 110
          - standby 3 preempt
          - no shutdown
          - exit
          - interface vlan 530
          - ip address 10.5.5.195 255.255.255.192
          - standby 4 ip 10.5.5.193
          - standby 4 priority 110
          - standby 4 preempt
          - no shutdown
          - end
          - write memory

# ────────────────────────────────────────────────────
# PHASE 3: ACL 보안 정책 적용 (와일드카드 마스크 완벽 수정판)
# ────────────────────────────────────────────────────
- name: "Phase 3: ACL 정책 적용 (DS - Telnet)"
  hosts: ds_switches
  gather_facts: false
  tasks:
    - name: "ACL 생성 및 SVI 적용"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - ip access-list extended GUEST_POLICY
          - permit tcp 10.5.5.128 0.0.0.63 any eq 80
          - permit tcp 10.5.5.128 0.0.0.63 any eq 443
          - deny ip 10.5.5.128 0.0.0.63 10.5.5.0 0.0.0.63
          - permit ip 10.5.5.128 0.0.0.63 any
          - exit
          - ip access-list extended ISOLATION_POLICY
          - deny ip 10.5.5.192 0.0.0.63 10.5.5.0 0.0.0.63
          - deny ip 10.5.5.192 0.0.0.63 10.5.5.64 0.0.0.63
          - deny ip 10.5.5.192 0.0.0.63 10.5.5.128 0.0.0.63
          - permit ip 10.5.5.192 0.0.0.63 any
          - exit
          - interface vlan 520
          - ip access-group GUEST_POLICY in
          - exit
          - interface vlan 530
          - ip access-group ISOLATION_POLICY in
          - end
          - write memory

# ────────────────────────────────────────────────────
# PHASE 4: STP 루프 방지 및 로드밸런싱 (루트 브릿지)
# ────────────────────────────────────────────────────
- name: "Phase 4-1: STP 설정 (SW2 — VLAN 500/510 루트)"
  hosts: sw2
  gather_facts: false
  tasks:
    - name: "Rapid-PVST+ 및 우선순위 설정"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - spanning-tree mode rapid-pvst
          - spanning-tree vlan 500 priority 4096
          - spanning-tree vlan 510 priority 4096
          - spanning-tree vlan 520 priority 8192
          - spanning-tree vlan 530 priority 8192
          - end
          - write memory

- name: "Phase 4-2: STP 설정 (SW6 — VLAN 520/530 루트)"
  hosts: sw6
  gather_facts: false
  tasks:
    - name: "Rapid-PVST+ 및 우선순위 설정"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - spanning-tree mode rapid-pvst
          - spanning-tree vlan 520 priority 4096
          - spanning-tree vlan 530 priority 4096
          - spanning-tree vlan 500 priority 8192
          - spanning-tree vlan 510 priority 8192
          - end
          - write memory

# ────────────────────────────────────────────────────
# PHASE 5: 다이내믹 라우팅 (OSPF Transit SVI + RIPv2)
# ────────────────────────────────────────────────────
- name: "Phase 5-1: OSPF + RIP 재분배 (BB - SSH)"
  hosts: modern_ssh_switches
  gather_facts: false
  tasks:
    - name: "Transit SVI 생성 (SW4 전용 IP 할당)"
      cisco.ios.ios_config:
        lines:
          - ip address 10.254.254.1 255.255.255.192
          - no shutdown
        parents: "interface vlan 99"
      when: "'4' in inventory_hostname"

    - name: "Transit SVI 생성 (SW5 전용 IP 할당)"
      cisco.ios.ios_config:
        lines:
          - ip address 10.254.254.2 255.255.255.192
          - no shutdown
        parents: "interface vlan 99"
      when: "'5' in inventory_hostname"

    - name: "OSPF 구동 및 재분배 설정 (VLAN 99 기반)"
      cisco.ios.ios_config:
        lines:
          - ip routing
          - router ospf 1
          - network 10.254.254.0 0.0.0.63 area 0
          - redistribute rip subnets
          - exit
          - router rip
          - version 2
          - network 10.5.5.0
          - redistribute ospf 1 metric 5
          - no auto-summary

    - name: "설정 저장"
      cisco.ios.ios_command:
        commands: write memory

- name: "Phase 5-2: RIPv2 설정 (DS - Telnet)"
  hosts: ds_switches
  gather_facts: false
  tasks:
    - name: "RIPv2 구동"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - terminal length 0
          - configure terminal
          - router rip
          - version 2
          - network 10.5.5.0
          - no auto-summary
          - end
          - write memory
