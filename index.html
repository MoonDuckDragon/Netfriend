<!-- filename: index.html -->
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>네트워크 대시보드</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #ffffff; color: #333; margin: 20px; }
        .control-panel { display: flex; align-items: center; margin-bottom: 10px; gap: 10px; flex-wrap: wrap; }
        #mynetwork {
            width: 100%;
            height: 600px;
            border: 2px solid #ccc;
            background-color: #fafafa;
        }
        button, select { padding: 8px 12px; font-weight: bold; border: 1px solid #ccc; border-radius: 5px; cursor: pointer;}
        button:hover { opacity: 0.8; }
        .btn-instant { background: #28a745; color: white; border:none;}
        .btn-refresh { background: #ffc107; color: black; border:none;}
        
        #logContainer { margin-top: 20px; border: 2px solid #333; border-radius: 5px; background-color: #1e1e1e; }
        #logHeader { background-color: #333; color: white; padding: 10px 15px; margin: 0; font-size: 16px; border-bottom: 1px solid #555; }
        #logConsole { height: 250px; overflow-y: auto; padding: 15px; color: #4af626; font-family: monospace; font-size: 14px; white-space: pre-wrap; line-height: 1.5; }

        #contextMenu { 
            display: none; position: absolute; background: #fff; border: 1px solid #ccc; 
            box-shadow: 2px 2px 5px rgba(0,0,0,0.2); z-index: 10000; border-radius: 5px; 
            padding: 5px 0; min-width: 150px; 
        }
        #contextMenu ul { list-style: none; padding: 0; margin: 0; }
        #contextMenu li { padding: 8px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
        #contextMenu li:hover { background: #007bff; color: white; }

        #cliModal {
            display: none; position: fixed; top: 10%; left: 20%; width: 60%; height: 70%;
            background: #1e1e1e; border: 2px solid #555; border-radius: 8px; z-index: 9999;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); flex-direction: column;
        }
        #cliHeader {
            background: #333; color: white; padding: 10px; font-weight: bold;
            display: flex; justify-content: space-between; border-bottom: 1px solid #555; border-radius: 8px 8px 0 0;
        }
        #cliCloseBtn { background: #dc3545; color: white; padding: 2px 8px; border:none; border-radius: 3px;}
        #cliHistory {
            flex-grow: 1; padding: 15px; color: #f8f8f2; font-family: monospace;
            font-size: 14px; overflow-y: auto; white-space: pre-wrap; line-height: 1.4;
        }
        #cliInputArea {
            display: flex; padding: 10px; background: #2d2d2d; border-top: 1px solid #555; border-radius: 0 0 8px 8px;
        }
        #cliPromptLabel { color: #f8f8f2; font-family: monospace; font-size: 14px; padding-top: 5px; margin-right: 5px; font-weight: bold;}
        #cliInput {
            flex-grow: 1; background: transparent; border: none; color: #f8f8f2;
            font-family: monospace; font-size: 14px; outline: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <h1>캡스톤 OOB 대시보드</h1>
    <div class="control-panel">
        <button class="btn-instant" onclick="discoverFullNetwork()">망 토폴로지 조회 (즉시)</button>
        <button class="btn-refresh" onclick="refreshNetwork()">강제 새로고침 (오래 걸림)</button>
        <button class="btn-instant" onclick="applySSoT()" style="background: #e67e22;">VLAN 500 SSoT 배포</button>
        
        <label for="vlanFilter">VLAN 필터(스위치): </label>
        <select id="vlanFilter" onchange="applyFilter()">
            <option value="all">전체 표시 (All)</option>
        </select>

        <label for="routerFilter" style="margin-left: 10px;">라우터 필터(IP대역): </label>
        <select id="routerFilter" onchange="applyFilter()">
            <option value="all">전체 표시 (All)</option>
        </select>
    </div>
    
    <div id="mynetwork"></div>

    <div id="logContainer">
        <h3 id="logHeader">실시간 장애/이벤트 로그 (SNMP Trap 기반 자동분석)</h3>
        <div id="logConsole">대기 중... (웹소켓 연결 확인)<br></div>
    </div>

    <div id="contextMenu">
        <ul id="menuList"></ul>
    </div>

    <div id="cliModal">
        <div id="cliHeader">
            <span id="cliTitle">Terminal</span>
            <button id="cliCloseBtn" onclick="closeCli()">X</button>
        </div>
        <div id="cliHistory"></div>
        <div id="cliInputArea">
            <span id="cliPromptLabel"></span>
            <input type="text" id="cliInput" autocomplete="off" onkeypress="handleCliEnter(event)">
        </div>
    </div>

    <script>
        const logConsole = document.getElementById('logConsole');
        function appendLog(msg) {
            const now = new Date();
            const timeStr = now.getHours().toString().padStart(2, '0') + ":" + 
                            now.getMinutes().toString().padStart(2, '0') + ":" + 
                            now.getSeconds().toString().padStart(2, '0');
            logConsole.innerHTML += `\n[${timeStr}] ${msg}\n`;
            logConsole.scrollTop = logConsole.scrollHeight;
        }

        try {
            const host = window.location.host || '127.0.0.1:8000';
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const ws = new WebSocket(wsProtocol + '//' + host + '/ws');
            ws.onopen = function() { appendLog("[System] 서버 통신 연결 완료."); };
            ws.onmessage = function(event) { appendLog(event.data); };
            ws.onclose = function() { appendLog("[System] 웹소켓 끊어짐."); };
            ws.onerror = function(err) { appendLog("[System] 웹소켓 에러."); };
        } catch (error) {
            appendLog("웹소켓 에러: " + error);
        }

        var nodes = new vis.DataSet([]);
        var edges = new vis.DataSet([]);
        var container = document.getElementById('mynetwork');
        var data = { nodes: nodes, edges: edges };
        
        var options = { 
            physics: { enabled: false },
            manipulation: { enabled: true, initiallyActive: true },
            edges: { smooth: false }, 
            interaction: { dragNodes: true, dragView: true, zoomView: true } 
        };
        var network = new vis.Network(container, data, options);

        let cachedTopology = null;

        function discoverFullNetwork() {
            appendLog("[System] 망 토폴로지 조회 중...");
            fetch('/api/discover')
            .then(res => res.json())
            .then(data => { cachedTopology = data; updateFilterOptions(); applyFilter(); })
            .catch(err => alert("조회 에러: " + err));
        }

        function refreshNetwork() {
            appendLog("[System] 강제 새로고침 시작...");
            fetch('/api/discover/refresh', { method: 'POST' })
            .then(res => res.json())
            .then(data => { cachedTopology = data; updateFilterOptions(); applyFilter(); })
            .catch(err => alert("새로고침 에러: " + err));
        }

        function applySSoT() {
            appendLog("[System] SSoT 기반 VLAN 500 설정 배포 중...");
            fetch('/api/ssot/vlan500', { method: 'POST' })
            .then(res => res.json())
            .then(data => {
                appendLog(data.message + '\n' + (data.output || ''));
            })
            .catch(err => alert("SSoT 배포 에러: " + err));
        }

        function updateFilterOptions() {
            if(!cachedTopology) return;
            const vlanSelect = document.getElementById('vlanFilter');
            const routerSelect = document.getElementById('routerFilter');
            
            const currentVlan = vlanSelect.value;
            const currentRouter = routerSelect.value;
            
            vlanSelect.innerHTML = '<option value="all">전체 표시 (All)</option>';
            routerSelect.innerHTML = '<option value="all">전체 표시 (All)</option>';

            if (cachedTopology.vlans) {
                cachedTopology.vlans.forEach(v => {
                    vlanSelect.innerHTML += `<option value="${v}">VLAN ${v}</option>`;
                });
            }
            if (cachedTopology.subnets) {
                cachedTopology.subnets.forEach(s => {
                    routerSelect.innerHTML += `<option value="${s}">대역: ${s}</option>`;
                });
            }
            
            vlanSelect.value = currentVlan || 'all';
            routerSelect.value = currentRouter || 'all';
        }

        function applyFilter() {
            if(!cachedTopology || !cachedTopology.nodes || cachedTopology.nodes.length === 0) return;
            const filterVlan = document.getElementById('vlanFilter').value;
            const filterRouter = document.getElementById('routerFilter').value;
            
            var nodeUpdates = [];
            cachedTopology.nodes.forEach(n => {
                let filteredIps = [];
                
                if (n.type === 'router') {
                    if (filterRouter === 'all') {
                        if(n.ip_map.routed) filteredIps.push(...n.ip_map.routed);
                    } else {
                        if(n.ip_map[filterRouter]) filteredIps.push(...n.ip_map[filterRouter]);
                    }
                } else {
                    if (filterVlan === 'all') {
                        if(n.ip_map.routed) filteredIps.push(...n.ip_map.routed);
                        for(let v in n.ip_map) if(v !== 'routed' && !v.includes('.x')) filteredIps.push(n.ip_map[v]);
                    } else {
                        if(n.ip_map[filterVlan]) filteredIps.push(n.ip_map[filterVlan]);
                    }
                }

                filteredIps = [...new Set(filteredIps)];
                let ipDisplay = filteredIps.join('\n');

                nodeUpdates.push({
                    id: n.id, 
                    label: n.id + (ipDisplay ? '\n[' + ipDisplay + ']' : ''), 
                    shape: n.type === 'router' ? 'cylinder' : 'box', 
                    color: n.type === 'router' ? '#005b96' : '#03396c', 
                    font: {color: 'white'}
                });
            });
            nodes.clear();
            nodes.add(nodeUpdates);

            var edgeUpdates = [];
            cachedTopology.edges.forEach((e, idx) => {
                let show = false;
                
                if(filterVlan === 'all') show = true;
                else {
                    if(e.vlan === filterVlan || e.vlan === 'trunk' || e.vlan === 'routed') show = true;
                }
                
                if(show) {
                    edgeUpdates.push({
                        id: 'dyn_' + idx, from: e.from, to: e.to, 
                        label: e.label, from_port: e.from_port, to_port: e.to_port
                    });
                }
            });
            edges.clear();
            edges.add(edgeUpdates);

            network.setOptions({ physics: { enabled: true, solver: 'repulsion' } });
            setTimeout(() => { network.setOptions({ physics: false }); }, 1000);
        }

        let currentCliDevice = null;
        let cliRecords = {};

        function openCli(deviceId) {
            currentCliDevice = deviceId;
            document.getElementById('cliModal').style.display = 'flex';
            document.getElementById('cliTitle').innerText = deviceId + " Console (SSH/Telnet)";
            document.getElementById('cliPromptLabel').innerText = "Loading...";
            
            if(!cliRecords[deviceId]) {
                cliRecords[deviceId] = `Connected to ${deviceId}.\nType commands below.\n\n`;
            }
            const historyDiv = document.getElementById('cliHistory');
            historyDiv.innerText = cliRecords[deviceId];
            historyDiv.scrollTop = historyDiv.scrollHeight;
            
            // 초기 접속 시 장비 프롬프트 실시간 확인
            fetch('/api/cli', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_device: deviceId, command: "" })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('cliPromptLabel').innerText = data.prompt ? data.prompt : (deviceId + "#");
            });

            setTimeout(() => document.getElementById('cliInput').focus(), 300);
        }

        function closeCli() {
            document.getElementById('cliModal').style.display = 'none';
            currentCliDevice = null;
        }

        function handleCliEnter(e) {
            if(e.key === 'Enter') {
                const inputEl = document.getElementById('cliInput');
                const cmd = inputEl.value;
                inputEl.value = '';
                
                const historyDiv = document.getElementById('cliHistory');
                const currentPrompt = document.getElementById('cliPromptLabel').innerText;
                
                cliRecords[currentCliDevice] += `${currentPrompt} ${cmd}\n`;
                historyDiv.innerText = cliRecords[currentCliDevice];
                historyDiv.scrollTop = historyDiv.scrollHeight;
                
                if(cmd.trim() === '') return;

                fetch('/api/cli', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target_device: currentCliDevice, command: cmd })
                })
                .then(res => res.json())
                .then(data => {
                    const out = data.output ? data.output : data.message;
                    if(out) cliRecords[currentCliDevice] += out + "\n";
                    if(data.prompt) document.getElementById('cliPromptLabel').innerText = data.prompt;
                    
                    historyDiv.innerText = cliRecords[currentCliDevice];
                    historyDiv.scrollTop = historyDiv.scrollHeight;
                }).catch(err => {
                    cliRecords[currentCliDevice] += "Error: " + err + "\n";
                    historyDiv.innerText = cliRecords[currentCliDevice];
                    historyDiv.scrollTop = historyDiv.scrollHeight;
                });
            }
        }

        let selectedElement = null;

        network.on("click", function () {
            document.getElementById('contextMenu').style.display = 'none';
        });

        network.on("oncontext", function (params) {
            params.event.preventDefault();
            const nodeId = network.getNodeAt(params.pointer.DOM);
            const edgeId = network.getEdgeAt(params.pointer.DOM);
            
            const menu = document.getElementById('contextMenu');
            const menuList = document.getElementById('menuList');
            menuList.innerHTML = '';

            if (nodeId) {
                selectedElement = nodeId;
                menuList.innerHTML += `<li onclick="actionNode('ping')">[${nodeId}] Ping 전송</li>`;
                menuList.innerHTML += `<li onclick="actionNode('cdp')">[${nodeId}] CDP 상세 정보 보기</li>`;
                menuList.innerHTML += `<li onclick="openCli('${nodeId}')">[${nodeId}] 터미널 콘솔 접속</li>`;
            } else if (edgeId) {
                const edge = edges.get(edgeId);
                selectedElement = edge;
                if(edge.from_port) {
                    menuList.innerHTML += `<li onclick="actionEdge('shut', '${edge.from}', '${edge.from_port}', '${edgeId}')">[${edge.from}] ${edge.from_port} 차단</li>`;
                    menuList.innerHTML += `<li onclick="actionEdge('noshut', '${edge.from}', '${edge.from_port}', '${edgeId}')">[${edge.from}] ${edge.from_port} 복구</li>`;
                }
                if(edge.to_port) {
                    menuList.innerHTML += `<li onclick="actionEdge('shut', '${edge.to}', '${edge.to_port}', '${edgeId}')">[${edge.to}] ${edge.to_port} 차단</li>`;
                    menuList.innerHTML += `<li onclick="actionEdge('noshut', '${edge.to}', '${edge.to_port}', '${edgeId}')">[${edge.to}] ${edge.to_port} 복구</li>`;
                }
            } else {
                return;
            }

            menu.style.display = 'block';
            menu.style.left = params.event.clientX + 'px';
            menu.style.top = params.event.clientY + 'px';
        });

        function actionNode(action) {
            document.getElementById('contextMenu').style.display = 'none';
            if (action === 'ping') {
                const targetIP = prompt(selectedElement + "에서 Ping 목적지 입력:");
                if (targetIP) {
                    appendLog(`[System] ${selectedElement} -> ${targetIP} Ping 전송 중...`);
                    fetch('/api/ping', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ source: selectedElement, target: targetIP }) })
                    .then(res => res.json()).then(data => appendLog(data.message));
                }
            } else if (action === 'cdp') {
                openCli(selectedElement);
                setTimeout(() => {
                    const inputEl = document.getElementById('cliInput');
                    inputEl.value = 'show cdp neighbors detail';
                    handleCliEnter({key: 'Enter'});
                }, 500);
            }
        }

        function actionEdge(action, device, port, edgeId) {
            document.getElementById('contextMenu').style.display = 'none';
            const endpoint = action === 'shut' ? '/api/shutdown' : '/api/restore';
            appendLog(`[System] ${device} 장비의 ${port} 포트 ${action === 'shut' ? '차단' : '복구'} 시도 중...`);
            
            fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target_device: device, target_port: port })
            })
            .then(res => res.json())
            .then(data => {
                appendLog(data.message + '\n' + (data.output || ''));
                edges.update({id: edgeId, color: {color: action === 'shut' ? 'red' : '#2B7CE9'}, dashes: action === 'shut'});
            });
        }

        document.addEventListener('DOMContentLoaded', discoverFullNetwork);
    </script>
</body>
</html>
