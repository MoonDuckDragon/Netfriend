# filename: inventory.yaml
all:
  children:
    routers:
      hosts:
        R3:
          ansible_host: 10.1.1.9
        R4:
          ansible_host: 10.1.1.10
      vars:
        ansible_connection: network_cli
        ansible_network_os: ios
        ansible_user: admin
        ansible_password: 1234
        ansible_become: yes
        ansible_become_method: enable
        ansible_become_password: 1234
        # sshpass를 이용한 점프 호스트 경유 설정
        ansible_ssh_common_args: '-o ProxyCommand="sshpass -p 1234 ssh -W %h:%p -p 2222 vboxuser@10.0.2.2 -o StrictHostKeyChecking=no" -o StrictHostKeyChecking=no -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o Ciphers=+aes128-cbc'

    modern_ssh_switches:
      hosts:
        SW4:
          ansible_host: 10.254.254.14
        SW5:
          ansible_host: 10.254.254.15
      vars:
        ansible_connection: network_cli
        ansible_network_os: ios
        ansible_user: ansible
        ansible_password: 1234
        ansible_become: yes
        ansible_become_method: enable
        ansible_become_password: 1234
        ansible_network_cli_ssh_type: paramiko
        ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o KexAlgorithms=+diffie-hellman-group14-sha1 -o HostKeyAlgorithms=+ssh-rsa -o Ciphers=+aes128-cbc'

    legacy_telnet_switches:
      hosts:
        SW2:
          ansible_host: 10.254.254.12
        SW6:
          ansible_host: 10.254.254.16
        SW8:
          ansible_host: 192.168.40.18
      vars:
        ansible_connection: local
        ansible_user: ansible
        ansible_password: 1234
