# filename: port_shut.yaml
---
- name: Shutdown Target Port
  hosts: "{{ target_device | string }}"
  gather_facts: false
  tasks:
    - name: Port Shutdown (SSH 기종)
      cisco.ios.ios_config:
        lines:
          - shutdown
        parents: interface {{ target_port | string }}
      when: ansible_connection == 'network_cli'

    - name: Port Shutdown (Telnet 기종)
      ansible.netcommon.telnet:
        user: "{{ ansible_user | string }}"
        password: "{{ ansible_password | string }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["[>#]"]
        command:
          - enable
          - "{{ ansible_password | string }}"
          - conf t
          - interface {{ target_port | string }}
          - shutdown
          - end
      when: ansible_connection == 'local'
