---
- name: NetDevOps 프로비저닝 (텔넷 구역 - EIGRP 초기화 및 멱등성 확보)
  hosts: legacy_telnet_switches
  gather_facts: false
  tasks:
    - name: "Task 1: [Init] 기존 EIGRP 라우팅 파괴 (초기화)"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - configure terminal
          - "no router eigrp 100"
          - end
      ignore_errors: true

    - name: "Task 2: [Deploy] EIGRP AS 100 강제 주입"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - configure terminal
          - router eigrp 100
          - network 10.0.0.0
          - network 192.168.99.0
          - end
          - write memory

- name: NetDevOps 프로비저닝 (SSH 구역 - Switch 4, 5)
  hosts: modern_ssh_switches
  gather_facts: false
  tasks:
    - name: "Task 1: [SSH] L3 라우팅 엔진 강제 개방 (ip routing)"
      cisco.ios.ios_config:
        lines:
          - ip routing

    - name: "Task 2: [SSH Deploy] EIGRP AS 100 정밀 주입 (부모-자식 강제 할당)"
      cisco.ios.ios_config:
        parents: router eigrp 100
        lines:
          - network 10.0.0.0
          - network 192.168.99.0
