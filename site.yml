# snmp_deploy.yml
- name: SNMP v2c + v3-authNoPriv 전체 배포
  hosts: all
  gather_facts: false
  tasks:
    - name: [SSH] K9 장비에 snmp 설정
      cisco.ios.ios_config:
        lines:
          - snmp-server community PUBKEY RO
          - snmp-server group AUTHGRP v3 auth
          - snmp-server user mon_auth AUTHGRP v3 auth sha AuthPass123
      when: inventory_hostname in groups['modern_ssh_switches']

    - name: [Telnet] 레거시 장비에 snmp 설정
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts: ["#"]
        command:
          - configure terminal
          - snmp-server community PUBKEY RO
          - snmp-server group AUTHGRP v3 auth
          - snmp-server user mon_auth AUTHGRP v3 auth sha AuthPass123
          - end
          - write memory
      when: inventory_hostname in groups['legacy_telnet_switches']

- name: SNMP v3-authPriv 추가 배포 (K9 전용)
  hosts: modern_ssh_switches
  gather_facts: false
  tasks:
    - name: AES-128 암호화 사용자 생성
      cisco.ios.ios_config:
        lines:
          - snmp-server group PRIVGRP v3 priv
          - snmp-server user mon_priv PRIVGRP v3 auth sha AuthPass123 priv aes 128 PrivPass123
