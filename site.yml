---
# ================================================================
# SNMP 배포 플레이북 (레거시 3대: SW2, SW6, SW8)
#  Phase 1 : 기존 SNMP 잔재 제거 (멱등성)
#  Phase 2 : v2c community 배포
#  Phase 3 : v3 authNoPriv (SHA) 배포
#  Phase 4 : show snmp user/group 으로 협상 결과 수집
# ================================================================

- name: "SNMP 차등 배포 (Telnet 레거시 구역)"
  hosts: legacy_telnet_switches
  gather_facts: false

  tasks:

    - name: "Task 1: [Init] 기존 SNMP 설정 초기화"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - configure terminal
          - no snmp-server user mon_auth AUTHGRP v3
          - no snmp-server group AUTHGRP v3 auth
          - no snmp-server community PUBKEY
          - end
      ignore_errors: true

    - name: "Task 2: [Deploy-v2c] community string 주입"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - configure terminal
          - snmp-server community PUBKEY RO
          - end

    - name: "Task 3: [Deploy-v3] authNoPriv 그룹/유저 생성 (SHA 시도)"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - configure terminal
          - snmp-server group AUTHGRP v3 auth
          - snmp-server user mon_auth AUTHGRP v3 auth sha AuthPass123
          - end
          - write memory
      register: v3_deploy
      ignore_errors: true

    - name: "Task 4: [Log] v3 배포 응답 출력"
      debug:
        msg: "{{ v3_deploy.output | default(['(출력 없음 — 명령 거부 가능)']) }}"

    - name: "Task 5: [Verify] show snmp user / group 수집"
      ansible.netcommon.telnet:
        user: "{{ ansible_user }}"
        password: "{{ ansible_password }}"
        login_prompt: "Username: ?"
        password_prompt: "Password: ?"
        prompts:
          - "#"
        command:
          - terminal length 0
          - show snmp user
          - show snmp group
      register: snmp_state
      ignore_errors: true

    - name: "Task 6: [Result] SNMP 협상 결과 판독"
      debug:
        var: snmp_state.stdout_lines
