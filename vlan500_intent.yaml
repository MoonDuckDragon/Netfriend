  pool_name: VLAN500_POOL
  exclude_start: 10.50.50.1
  exclude_end: 10.50.50.10
  default_router: 10.50.50.4
  dns: 8.8.8.8
  route_next_hop: 10.1.1.14

core_switches:
  SW4:
    svi_ip: 10.50.50.4
    helper_address: 10.1.1.9
    routing_protocols:
      ospf:
        process_id: 1
        area: 0
        networks:
          - '10.50.50.0 0.0.0.255'
          - '10.0.1.0 0.0.0.255'
      rip:
        version: 2
        networks:
          - '10.0.0.0'
    redistribute: true
  SW5:
    svi_ip: 10.50.50.5
    helper_address: 10.1.1.9
    routing_protocols:
